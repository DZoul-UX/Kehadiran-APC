<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehadiran APC & Raya 2026 - JKNS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #008080;
            --gold: #D4AF37;
            --deep-green: #2E7D32;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #004d40 0%, #008080 50%, #2e7d32 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 2.5rem 2rem;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            border: 3px solid var(--gold);
            box-sizing: border-box;
            text-align: center;
        }

        .dept-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--teal);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .raya-decor {
            font-size: 2.2rem;
            margin-bottom: 15px;
            display: block;
        }

        .main-title {
            margin: 10px 0 25px 0;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .title-line {
            display: block;
            font-weight: 800;
        }

        .word-majlis {
            font-size: 1.1rem;
            color: var(--teal);
            letter-spacing: 2px;
        }

        .word-apc {
            font-size: 1.4rem;
            color: var(--teal); /* Changed to Teal */
            margin: 5px 0;
        }

        .word-and {
            font-size: 1.5rem;
            color: var(--teal); /* Changed to Teal (No more red/orange) */
            margin: 2px 0;
        }

        .word-raya {
            font-size: 1.3rem;
            color: var(--deep-green);
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
            display: block;
            padding-left: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px; 
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--teal);
            outline: none;
            background-color: #f0fdfa;
        }

        button {
            width: 100%;
            background: linear-gradient(45deg, var(--teal), var(--deep-green));
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 10px;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .footer {
            margin-top: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--deep-green);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="card">
    <span class="dept-label">Jabatan Keretapi Negeri Sabah</span>
    <span class="raya-decor">🌙 🕌 ✨</span>
    
    <div class="main-title">
        <span class="title-line word-majlis">Majlis</span>
        <span class="title-line word-apc">Anugerah Perkhidmatan Cemerlang 2026</span>
        <span class="title-line word-and">&</span>
        <span class="title-line word-raya">Selamat Hari Raya Aidilfitri</span>
    </div>

    <form id="attendanceForm">
        <div class="form-group">
            <label for="name">Nama Penuh</label>
            <input type="text" id="name" name="name" placeholder="Nama anda" required>
        </div>

        <div class="form-group">
            <label for="department">Bahagian / Unit</label>
            <input type="text" id="department" name="department" placeholder="Contoh: Pasukan Inovasi Digital" required>
        </div>
        
        <button type="submit" id="submitBtn">Sahkan Kehadiran</button>
    </form>

    <div class="footer">
        Selamat Hari Raya Maaf Zahir & Batin
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyKArjLsU0JYJSVTL6Pio5mHmJ17pl93h-2Ubtr1I-n6e1dDWIBFE6_cEh1hzL4jwA/exec';
    const form = document.getElementById('attendanceForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "Menghantar...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("Terima Kasih! Kehadiran anda telah berjaya direkodkan.");
                form.reset();
                btn.disabled = false;
                btn.innerHTML = "Sahkan Kehadiran";
            })
            .catch(error => {
                alert("Maaf, terdapat ralat. Sila cuba lagi.");
                btn.disabled = false;
                btn.innerHTML = "Sahkan Kehadiran";
            });
    });
</script>

</body>
</html>
