<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehadiran APC & Raya 2026 - JKNS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #008080;
            --gold: #D4AF37;
            --deep-green: #2E7D32;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: url('https://lh3.googleusercontent.com/d/1c9G_srPI5UdaAfNb8PP1QClVgeXPZFY9') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(5px);
            padding: 2.5rem 2rem;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            border: 3px solid var(--gold);
            box-sizing: border-box;
            text-align: center;
        }

        .dept-label {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--teal);
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .raya-decor {
            font-size: 2.2rem;
            margin-bottom: 15px;
            display: block;
        }

        .main-title {
            margin: 10px 0 25px 0;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .title-line { display: block; font-weight: 800; }
        .word-majlis { font-size: 1.1rem; color: var(--teal); letter-spacing: 2px; }
        .word-apc { font-size: 1.4rem; color: var(--teal); margin: 5px 0; }
        .word-and { font-size: 1.5rem; color: var(--teal); margin: 2px 0; }
        .word-raya { font-size: 1.3rem; color: var(--deep-green); }

        .form-group { margin-bottom: 1.2rem; text-align: left; }
        label { font-size: 0.85rem; font-weight: 700; color: #333; margin-bottom: 6px; display: block; }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
        }

        button {
            width: 100%;
            background: linear-gradient(45deg, var(--teal), var(--deep-green));
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #ticketOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .ticket {
            background: white;
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .ticket-header { background: var(--teal); color: white; padding: 20px; text-align: center; }
        .ticket-body { padding: 30px 25px; text-align: center; position: relative; }
        
        .ticket-info { margin-bottom: 20px; }
        .ticket-label { font-size: 0.7rem; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .ticket-value { font-size: 1.2rem; font-weight: 700; color: #333; display: block; }
        .ticket-id { background: #f0f0f0; padding: 10px 20px; display: inline-block; border-radius: 5px; font-family: monospace; font-weight: bold; margin-top: 10px; color: var(--teal); }
        
        .close-btn { margin-top: 25px; background: var(--gold); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <span class="dept-label">Jabatan Keretapi Negeri Sabah</span>
    <span class="raya-decor">🌙 🕌 ✨</span>
    
    <div class="main-title">
        <span class="title-line word-majlis">Majlis</span>
        <span class="title-line word-apc">Anugerah Perkhidmatan Cemerlang Tahun 2025</span>
        <span class="title-line word-and">&</span>
        <span class="title-line word-raya">Sanjungan Budi</span>
    </div>

    <form id="attendanceForm">
        <div class="form-group">
            <label for="name">Nama Penuh</label>
            <input type="text" id="name" name="name" placeholder="Nama anda" required>
        </div>

        <div class="form-group">
            <label for="department">Bahagian / Unit</label>
            <input type="text" id="department" name="department" placeholder="Bahagian anda" required>
        </div>
        
        <button type="submit" id="submitBtn">Sahkan Kehadiran</button>
    </form>
</div>

<div id="ticketOverlay">
    <div style="text-align: center;">
        <div class="ticket">
            <div class="ticket-header">
                <div style="font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 5px;">PAS MASUK RASMI</div>
                <div style="font-weight: 800; font-size: 1.1rem;">APC & RAYA JKNS 2026</div>
            </div>
            <div class="ticket-body">
                <div class="ticket-info">
                    <span class="ticket-label">Nama Peserta</span>
                    <span class="ticket-value" id="disp-name">Nama Peserta</span>
                </div>
                <div class="ticket-info">
                    <span class="ticket-label">Bahagian / Unit</span>
                    <span class="ticket-value" id="disp-dept">Bahagian</span>
                </div>
                <div class="ticket-id" id="disp-id">JKNS-0000</div>
            </div>
        </div>
        <button class="close-btn" onclick="location.reload()">Selesai</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyKArjLsU0JYJSVTL6Pio5mHmJ17pl93h-2Ubtr1I-n6e1dDWIBFE6_cEh1hzL4jwA/exec';
    const form = document.getElementById('attendanceForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "Sila Tunggu...";

        const nameValue = document.getElementById('name').value;
        const deptValue = document.getElementById('department').value;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                document.getElementById('disp-name').innerText = nameValue;
                document.getElementById('disp-dept').innerText = deptValue;
                document.getElementById('disp-id').innerText = 'JKNS-' + Math.floor(1000 + Math.random() * 9000);
                document.getElementById('ticketOverlay').style.display = 'flex';
                form.reset();
            })
            .catch(error => {
                alert("Maaf, terdapat ralat. Sila cuba lagi.");
                btn.disabled = false;
                btn.innerHTML = "Sahkan Kehadiran";
            });
    });
</script>

</body>
</html>
